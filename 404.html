<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1b4b, #0f0c29);
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 1.5rem;
        }

        .container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }

        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 1.5rem;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .glow-404 {
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #38bdf8, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            color: #f1f5f9;
            font-size: clamp(1.1rem, 2.5vw, 1.7rem);
            margin-top: 1.2rem;
            font-weight: 600;
        }

        p {
            color: #94a3b8;
            margin-top: 0.7rem;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 2.2rem;
            padding: 0.9rem 2.2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .btn .material-symbols-rounded {
            font-size: 20px;
            font-variation-settings:
                'FILL' 0,
                'wght' 500,
                'GRAD' 0,
                'opsz' 20;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/condrock/condrock.github.io/main/images/condrock.png" loading="lazy"
            height="16" alt="Condrock Logo" class="logo">
        <div class="glow-404">404</div>
        <h1>404 nih bousz! <span class="material-symbols-rounded">
                rocket_launch
            </span> Halamannya ilang.</h1>
        <p>Mending balik ke beranda, di sana lebih rame.</p>
        <a href="/" class="btn">
            <span class="material-symbols-rounded">arrow_back</span>
            Kembali ke Beranda<span class="material-symbols-rounded">
                mood
            </span>
        </a>
    </div>

</body>

</html>
